<script>

const API = "https://script.google.com/macros/s/AKfycbw8n_Yd8g0hY5UOQQlFLpuowfc35a0wtLCI1ac9k-46TVDB20iPtR9nXieb9tFQE5QNtQ/exec";
// 这个密钥要和 Apps Script 里 Script Properties 里设置的 API_TOKEN 完全一致
// 换成你自己生成的一长串随机字符串，不要用示例里的这个
const API_TOKEN = "678m";

// 读取（搜索/扫描）走这个发布到网络的 CSV 链接，速度更快、体验更好
// Google Sheet → 文件 → 分享 → 发布到网络 → 选中对应分页 → 格式选 CSV → 把链接粘到下面
// 列顺序需要跟 syncCatalogData() 里的映射一致：name, upc, price, location, supplier, cost
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoB8gGX8SOtTIE-v5GjdZkPHga-1N1gHz7MsNfk-L4VVHbipmUYDKURUxBT8Cuy_gmOhImOPui3ltN/pub?gid=0&single=true&output=csv";

let db = {};
let scanMap = {};
let currentItem = null;
let isAuthenticated = false;
let cameraScanActive = false;
let html5QrCode = null;          // html5-qrcode 实例，跨浏览器（含 iOS Safari）复用
let lastDecodedValue = "";
let lastDecodedAt = 0;
let selectedSearchUpcs = new Set();
let currentSearchResults = [];
const PASSWORD = "7333";
const statusEl = document.getElementById("status");
const cameraStatus = document.getElementById("cameraStatus");
const cameraScanPanel = document.getElementById("cameraScanPanel");

// 密码验证
function verifyPassword(){
  const pwd = document.getElementById("passwordInput").value;
  if(pwd === PASSWORD) {
    isAuthenticated = true;
    document.getElementById("loginPopup").style.display = "none";
    document.getElementById("passwordInput").value = "";
    loadLocalDB();
    loadScanMap();
  } else {
    alert("Incorrect password!");
    document.getElementById("passwordInput").value = "";
  }
}

async function syncCatalogData(){
  if(CSV_URL.includes("PASTE_YOUR_PUBLISHED_CSV_URL_HERE")){
    throw new Error("CSV_URL not configured");
  }

  const response = await fetch(CSV_URL, {cache: "no-store"});
  if(!response.ok) throw new Error("sync failed");

  const text = await response.text();
  const parsed = Papa.parse(text, {skipEmptyLines: true});
  // 第一行是表头，跳过；每行顺序：name, upc, price, location, supplier, cost
  const rows = parsed.data.slice(1);

  db = {};
  rows.forEach(row=>{
    if(!row[1]) return; // 没有 upc 的行跳过
    db[row[1]] = {
      name: row[0],
      upc: row[1],
      price: row[2],
      location: row[3]||"",
      supplier: row[4]||"",
      cost: row[5]||0
    };
  });

  Object.keys(scanMap).forEach(upc=>{
    if(db[upc]){
      scanMap[upc] = {...db[upc], qty: scanMap[upc].qty};
    }
  });

  localStorage.setItem("productDB", JSON.stringify(db));
  renderList();

  if(document.getElementById("searchPopup").style.display === "block"){
    refreshSearchResults();
  }
}

// 同步
function syncData() {
  statusEl.innerText = "Syncing...";
  syncCatalogData()
  .then(()=>{
    statusEl.innerHTML = 'Status: Synced <span class="status-dot"></span>';
  })
  .catch(()=>{
    statusEl.innerText = "Status: Not Synced";
  });
}

function syncInfo(){
  openSupplierDialog();
}

function openSupplierDialog(){
  document.getElementById('markSupplierName').value = '';
  document.getElementById('markSupplierPopup').style.display = 'block';
}

function closeSupplierDialog(){
  document.getElementById('markSupplierPopup').style.display = 'none';
}

function saveMarkSupplier(){
  const supplierName = document.getElementById('markSupplierName').value.trim();
  if(!supplierName){
    alert('Supplier name is empty. No changes were made.');
    closeSupplierDialog();
    return;
  }

  const items = Object.values(scanMap);
  if(items.length === 0){
    alert('No products in the list to mark.');
    closeSupplierDialog();
    return;
  }

  const updateRequests = items.map(p => {
    const data = {
      action: 'update',
      upc: p.upc,
      name: p.name,
      price: p.price,
      location: p.location,
      supplier: supplierName,
      cost: p.cost,
      token: API_TOKEN
    };

    db[p.upc] = {...data};
    scanMap[p.upc] = {...data, qty: p.qty};

    return fetch(API, {method: 'POST', body: JSON.stringify(data)})
      .then(resp => {
        if(!resp.ok) throw new Error('Update failed');
        return resp.text();
      })
      .catch(() => null);
  });

  Promise.allSettled(updateRequests).then(() => {
    localStorage.setItem('productDB', JSON.stringify(db));
    renderList();
    closeSupplierDialog();
    statusEl.innerHTML = `Status: Marked ${items.length} products to ${supplierName} <span class="status-dot"></span>`;
  }).catch(() => {
    statusEl.innerText = 'Status: Mark supplier failed';
    closeSupplierDialog();
  });
}

function loadLocalDB(){
  const d = localStorage.getItem("productDB");
  if(d){
    db = JSON.parse(d);
    statusEl.innerText = "⚡ Local Mode";
  }
}

function saveScanMap(){
  try{ localStorage.setItem('scanMap', JSON.stringify(scanMap)); } catch(e){}
}

function loadScanMap(){
  const d = localStorage.getItem('scanMap');
  if(d){
    try{ scanMap = JSON.parse(d) || {}; } catch(e){ scanMap = {}; }
    renderList();
  }
}

function handleEnter(e){
  if(e.key==="Enter") scanProduct();
}

function handleSearchEnter(e){
  if(e.key==="Enter") searchProducts();
}

/* ============================================================
   摄像头扫码：使用 html5-qrcode（内部同样是纯 JS 解码，不依赖
   浏览器原生 BarcodeDetector API），专门处理了 iOS Safari 上
   摄像头就绪时机、对焦、扫描区域裁剪等兼容性问题，在 Android
   Chrome 上速度、识别率也和原生方案接近。
   ============================================================ */

function getHtml5QrCode(){
  if(html5QrCode) return html5QrCode;

  if(typeof Html5Qrcode === "undefined"){
    throw new Error("html5-qrcode library failed to load");
  }

  html5QrCode = new Html5Qrcode("cameraReaderDiv", {
    // 覆盖超市/仓库场景可能出现的一维码格式，含 UPC/EAN 标准格式，
    // 以及部分供应商内部标签常用的 ITF / Codabar / Code93
    formatsToSupport: [
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.UPC_EAN_EXTENSION,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.CODE_93,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.CODABAR,
      Html5QrcodeSupportedFormats.QR_CODE
    ],
    verbose: false
  });

  return html5QrCode;
}

async function startCameraScan(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    alert("Camera access is not supported on this browser.");
    return;
  }

  if(!window.isSecureContext){
    cameraStatus.innerText = "Camera scan requires HTTPS or localhost. Please open this page via a local server and try again.";
    alert("Camera scan requires HTTPS or localhost. Please open this page through a secure/local server.");
    return;
  }

  let reader;
  try{
    reader = getHtml5QrCode();
  } catch(e){
    alert("Barcode scanner failed to load. Please check your internet connection and try again.");
    return;
  }

  cameraScanPanel.style.display = "block";
  cameraScanActive = true;
  lastDecodedValue = "";
  lastDecodedAt = 0;
  cameraStatus.innerText = "Requesting camera access...";

  const config = {
    fps: 10,
    qrbox: { width: 300, height: 180 }, // 扫描裁剪区域，比一维码本身留够余量
    aspectRatio: 1.5,
    disableFlip: true,
    // 明确请求更高分辨率：窄条码（如 ITF/Code128）对分辨率很敏感，
    // 默认摄像头分辨率经常不够细，加大后能明显提升识别成功率
    videoConstraints: {
      facingMode: { ideal: "environment" },
      width: { ideal: 1920 },
      height: { ideal: 1080 },
      advanced: [{ focusMode: "continuous" }] // 部分安卓机型支持，iOS 会忽略，无副作用
    }
  };

  try{
    await reader.start(
      { facingMode: "environment" }, // 优先后置摄像头，iOS/Android 通用写法
      config,
      (decodedText) => {
        if(!cameraScanActive) return;
        const value = String(decodedText || "").trim();
        const now = Date.now();
        // 简单防抖：避免同一帧连续多次触发同一个码
        if(value && (value !== lastDecodedValue || now - lastDecodedAt > 1200)){
          lastDecodedValue = value;
          lastDecodedAt = now;
          cameraStatus.innerText = `Detected: ${value}`;
          barcode.value = value;
          stopCameraScan();
          scanProduct();
        }
      },
      () => { /* 每一帧没扫到码都会触发一次，属正常现象，忽略即可 */ }
    );

    cameraStatus.innerText = "Point your camera at a barcode.";
  } catch(error){
    console.error(error);
    cameraStatus.innerText = "Camera permission denied or unavailable.";
    alert("Unable to access your camera. Please allow camera access or use the barcode input.");
    cameraScanActive = false;
    cameraScanPanel.style.display = "none";
  }
}

function stopCameraScan(){
  cameraScanActive = false;

function createSearchLabel(text){
  const label = document.createElement("div");
  label.textContent = text;
  return label;
}

function renderSearchResults(results){
  currentSearchResults = results;
  const searchResults = document.getElementById("searchResults");
  searchResults.innerHTML = "";

  results.forEach(p => {
    const card = document.createElement("div");
    card.className = selectedSearchUpcs.has(p.upc) ? "search-result-card selected" : "search-result-card";

    const toggle = document.createElement("button");
    toggle.type = "button";
    toggle.className = "selection-toggle";
    toggle.innerHTML = selectedSearchUpcs.has(p.upc) ? "●" : "○";
    toggle.onclick = (event) => {
      event.stopPropagation();
      toggleSearchSelection(p.upc);
    };

    const content = document.createElement("div");
    content.className = "product-meta";

    const name = document.createElement("b");
    name.textContent = p.name;

    const upc = createSearchLabel(`UPC: ${p.upc}`);
    const info = createSearchLabel(`Price: $${p.price} | Location: ${p.location}`);
    const supplier = createSearchLabel(`Supplier: ${p.supplier} | Cost: $${p.cost}`);

    content.appendChild(name);
    content.appendChild(upc);
    content.appendChild(info);
    content.appendChild(supplier);

    card.appendChild(toggle);
    card.appendChild(content);
    card.onclick = () => toggleSearchSelection(p.upc);

    searchResults.appendChild(card);
  });
}

function refreshSearchResults(){
  renderSearchResults(currentSearchResults);
}

function toggleSearchSelection(upc){
  if(selectedSearchUpcs.has(upc)){
    selectedSearchUpcs.delete(upc);
  } else {
    selectedSearchUpcs.add(upc);
  }
  refreshSearchResults();
}

// 搜索产品 - 所有关键字都需要完全匹配（忽略大小写和符号）
function searchProducts(){
  const rawKeyword = document.getElementById("search").value.trim();
  if(!rawKeyword) return alert("Please enter product name or UPC");

  selectedSearchUpcs.clear();

  const normalize = text => String(text || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
  const keywords = rawKeyword.toLowerCase().split(/\s+/).filter(Boolean);

  const results = Object.values(db)
    .map(p => {
      const fields = [p.name, p.upc, p.location, p.supplier, p.price, p.cost].join(" ");
      const normalizedFields = normalize(fields);

      const allMatch = keywords.every(term => {
        const normalizedTerm = normalize(term);
        return normalizedFields.includes(normalizedTerm);
      });

      return { ...p, match: allMatch };
    })
    .filter(p => p.match)
    .sort((a, b) => a.name.localeCompare(b.name));

  if(results.length === 0){
    alert("No products found. Make sure all keywords match.");
    return;
  }

  renderSearchResults(results);
  document.getElementById("searchPopup").style.display = "block";
}

function addSelectedFromSearch(){
  if(selectedSearchUpcs.size === 0){
    alert("Please select at least one product.");
    return;
  }

  selectedSearchUpcs.forEach(upc => {
    const p = db[upc];
    if(!p) return;

    if(!scanMap[upc]) scanMap[upc] = {...p, qty:0};
    scanMap[upc].qty++;
  });

  renderList();
  closeSearch();
  document.getElementById("search").value = "";
}

function closeSearch(){
  document.getElementById("searchPopup").style.display = "none";
}

/* ============================================================
   UPC 位数归一化：有些产品在数据库里只存了 10 位核心数字，
   但摄像头/扫码枪实际吐出来的是标准 11/12/13 位编码（多了系统位
   和/或校验位）。这里在原始码之外，再生成几种常见的等价形式，
   依次去数据库里找，命中就用命中的那个 key。
   ============================================================ */
function upcLookupCandidates(rawCode){
  const code = String(rawCode || "").replace(/[^0-9]/g, "");
  const candidates = [code];

  // 12 位标准 UPC-A：首位系统码 + 10 位数据 + 末位校验码
  // -> 去掉首尾，得到 10 位核心数字
  if(code.length === 12){
    candidates.push(code.slice(1, 11));   // 10 位（去系统位+校验位）
    candidates.push(code.slice(0, 11));   // 11 位（去校验位）
  }

  // 13 位 EAN-13，如果是以 0 开头，其实是 UPC-A 前面补了个 0
  if(code.length === 13 && code.charAt(0) === "0"){
    const upcA = code.slice(1); // 还原成 12 位 UPC-A
    candidates.push(upcA);
    candidates.push(upcA.slice(1, 11));
    candidates.push(upcA.slice(0, 11));
  }

  // 11 位（系统位+10位数据，没有校验码）-> 去掉系统位就是 10 位核心
  if(code.length === 11){
    candidates.push(code.slice(1));
  }

  // 10 位核心数字：反过来试着拼出 11/12 位，兼容数据库里存的是完整 UPC 的情况
  if(code.length === 10){
    const withSystem = "0" + code;             // 11 位：系统位 0 + 10 位数据
    candidates.push(withSystem);
    candidates.push(withSystem + upcCheckDigit(withSystem)); // 12 位完整 UPC-A
  }

  // 去重，保留原始顺序（原始扫描码优先）
  return [...new Set(candidates)];
}

// 标准 UPC-A 校验码算法：输入 11 位（系统位+10位数据），返回 1 位校验码
function upcCheckDigit(elevenDigits){
  let oddSum = 0, evenSum = 0;
  for(let i = 0; i < 11; i++){
    const d = parseInt(elevenDigits.charAt(i), 10) || 0;
    if(i % 2 === 0) oddSum += d; else evenSum += d;
  }
  const total = oddSum * 3 + evenSum;
  return String((10 - (total % 10)) % 10);
}

// 依次尝试原始码和归一化候选码，返回 {key, product} 或 null
function findProductByCode(rawCode){
  const candidates = upcLookupCandidates(rawCode);
  for(const key of candidates){
    if(db[key]) return {key, product: db[key]};
  }
  return null;
}

// 扫码
function scanProduct(){
  const code = barcode.value.trim();
  if(!code) return;

  const found = findProductByCode(code);

  if(!found){
    if(confirm("Not found. Add?")) openPopup(code);
    return;
  }

  const { key, product } = found;
  if(!scanMap[key]) scanMap[key] = {...product, qty:0};
  scanMap[key].qty++;

  renderList();
  barcode.value="";
}

// 渲染
function renderList(){
  list.innerHTML="";
  Object.values(scanMap).reverse().forEach(p=>{
    const d=document.createElement("div");
    d.className="item";

    d.innerHTML=`
      <div class="item-row">
        <div class="item-content">
          <b>${p.name}</b>
          <div class="item-meta">
            <span>UPC: ${p.upc}</span>
            <span>Price: $${p.price}</span>
            <span>Loc: ${p.location}</span>
            <span>Supplier: ${p.supplier}</span>
            <span>Cost: $${p.cost}</span>
          </div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
          <label style="font-size:17px; color:#555;">Qty</label>
          <input class="qty-input" data-upc="${p.upc}" type="number" min="0" value="${p.qty}" />
        </div>
      </div>
    `;

    const qtyInput = d.querySelector('.qty-input');
    if(qtyInput){
      qtyInput.addEventListener('click', e => e.stopPropagation());
      qtyInput.addEventListener('change', e => {
        e.stopPropagation();
        const value = parseInt(e.target.value || '0', 10);
        if(isNaN(value) || value < 0) return;
        if(value === 0){
          delete scanMap[p.upc];
        } else {
          if(!scanMap[p.upc]) scanMap[p.upc] = {...db[p.upc], qty:0};
          scanMap[p.upc].qty = value;
        }
        renderList();
      });
    }

    d.onclick=()=>showActionPopup(p);
    list.appendChild(d);
  });
  saveScanMap();
}

// Action
function showActionPopup(p){
  currentItem=p;
  actionInfo.innerHTML=`
  <b>${p.name}</b><br>
  ${p.upc}<br>
  $${p.price} | ${p.location}<br>
  ${p.supplier} | $${p.cost}
  `;
  const qtyInput = document.getElementById('action_qty');
  if(qtyInput) qtyInput.value = p.qty || 0;
  actionPopup.style.display="block";
}

function closeAction(){ actionPopup.style.display="none"; }

function removeItem(){
  delete scanMap[currentItem.upc];
  closeAction();
  renderList();
}

function editItem(){
  closeAction();
  openEditPopup(currentItem);
}

function setItemQty(){
  const v = parseInt(document.getElementById('action_qty').value || '0', 10);
  if(isNaN(v) || v < 0) return alert('Enter a valid quantity');
  if(!currentItem) return;
  if(v === 0){
    delete scanMap[currentItem.upc];
  } else {
    if(!scanMap[currentItem.upc]) scanMap[currentItem.upc] = {...db[currentItem.upc], qty:0};
    scanMap[currentItem.upc].qty = v;
  }
  closeAction();
  renderList();
}

function openClearDialog(){
  const keys = Object.keys(scanMap);
  if(keys.length === 0) return alert('List is already empty.');
  document.getElementById('clearConfirmPopup').style.display = 'block';
}

function closeClearDialog(){
  document.getElementById('clearConfirmPopup').style.display = 'none';
}

function clearListConfirmed(){

  try{ localStorage.removeItem('scanMap'); }catch(e){}

}

function updateProduct(){
  const data={
    action:"update",
    upc:edit_upc.value,
    name:edit_name.value,
    price:edit_price.value,
    location:edit_location.value,
    supplier:edit_supplier.value,
    cost:edit_cost.value,

  fetch(API,{method:"POST",body:JSON.stringify(data)})

      scanMap[data.upc] = {...data, qty: scanMap[data.upc].qty};
    }
    localStorage.setItem("productDB",JSON.stringify(db));
    closeEdit();
    renderList();
    alert("updates suscessiful, please wait around 1 minute to feitch the cloud");
  });
}

// Excel
function exportExcel(){
  const items=Object.values(scanMap);
  if(!items.length) return alert("No data");

  const wb=XLSX.utils.book_new();
  const group={};

  items.forEach(p=>{
    if(!group[p.supplier]) group[p.supplier]=[];
    group[p.supplier].push(p);
  });

  Object.keys(group).forEach(s=>{
    const arr=[["UPC","Name","Qty","Cost","Total"]];
    group[s].forEach(p=>{
      arr.push([p.upc,p.name,p.qty,p.cost,p.qty*p.cost]);
    });
    const ws=XLSX.utils.aoa_to_sheet(arr);
    
    const colWidths = [];
    arr[0].forEach((_, colIdx) => {
      let maxLen = arr[0][colIdx].toString().length;
      for(let row = 1; row < arr.length; row++){
        const len = arr[row][colIdx].toString().length;
        if(len > maxLen) maxLen = len;
      }
      colWidths.push({wch: maxLen + 2});
    });
    ws['!cols'] = colWidths;
    
    XLSX.utils.book_append_sheet(wb,ws,s);
  });

  const now = new Date();
  const pad = num => String(num).padStart(2, "0");
  const fileName = `678 Markham Rd Jian Hing ${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}.xlsx`;
  XLSX.writeFile(wb, fileName);
}
