<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FreshPro System PRO</title>

<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { 
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
  padding:10px; 
  background:linear-gradient(135deg, #f5f0ff 0%, #ede5ff 100%);
  margin:0;
}

header {
  background:linear-gradient(135deg, #6B4C9A 0%, #7B68BE 100%);
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 12px rgba(107, 76, 154, 0.3);
  text-align:center;
  color:white;
}

.logo-container {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
}

.logo-text {
  font-size:32px;
}

header h1 {
  margin:0;
  font-size:28px;
  font-weight:700;
  letter-spacing:-0.5px;
}

header p {
  margin:5px 0 0 0;
  font-size:13px;
  opacity:0.9;
  letter-spacing:2px;
}

.card {
  background:white;
  padding:15px;
  margin-top:10px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(107, 76, 154, 0.15);
  border-left:4px solid #6B4C9A;
}

button {
  background:linear-gradient(135deg, #6B4C9A 0%, #7B68BE 100%);
  color:white;
  border:none;
  padding:14px;
  margin-top:10px;
  font-size:18px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:all 0.3s ease;
  box-shadow:0 2px 8px rgba(107, 76, 154, 0.2);
}

button:hover {
  background:linear-gradient(135deg, #5A3A8A 0%, #6B4C9A 100%);
  box-shadow:0 4px 12px rgba(107, 76, 154, 0.3);
  transform:translateY(-2px);
}

input {
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:18px;
  border:2px solid #E5DDF5;
  border-radius:8px;
  box-sizing:border-box;
  transition:border-color 0.3s ease;
}

input:focus {
  outline:none;
  border-color:#6B4C9A;
  box-shadow:0 0 8px rgba(107, 76, 154, 0.2);
}

.item {
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
  transition:all 0.2s ease;
}

.item:hover { 
  background:#f5f0ff;
  padding-left:15px;
}

.item-row {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
}

.item-content {
  flex:1;
  min-width:0;
}

.item-meta {
  display:grid;
  grid-template-columns:repeat(2, minmax(0, max-content));
  gap:6px 18px;
  font-size:18px;
  color:#555;
  margin-top:8px;
}

.item-content > b {
  font-size:20px;
  display:block;
  margin-bottom:6px;
}

.qty-input {
  width:80px;
  padding:10px 12px;
  font-size:16px;
  border:2px solid #E5DDF5;
  border-radius:8px;
  box-sizing:border-box;
}

.qty-input:focus {
  outline:none;
  border-color:#6B4C9A;
  box-shadow:0 0 8px rgba(107, 76, 154, 0.2);
}

.search-result-card {
  position:relative;
  padding:12px 12px 12px 52px;
  border:1px solid #ddd;
  margin:10px 0;
  border-radius:8px;
  background:#fff;
  cursor:pointer;
  transition:all 0.2s ease;
}

.search-result-card:hover {
  background:#f8f4ff;
}

.search-result-card.selected {
  background:#e8f2ff;
  border-color:#8db8ff;
}

.search-result-card.selected .selection-toggle {
  background:#6B4C9A;
  color:#fff;
}

.search-result-card .product-meta {
  display:flex;
  flex-direction:column;
  gap:4px;
  font-size:18px;
  color:#444;
}

.selection-toggle {
  position:absolute;
  top:12px;
  left:12px;
  width:30px;
  height:30px;
  border-radius:50%;
  border:2px solid #6B4C9A;
  background:transparent;
  color:#6B4C9A;
  font-size:18px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:0;
}

.badge {
  float:right;
  background:linear-gradient(135deg, #FFD700 0%, #FFC107 100%);
  color:#333;
  padding:4px 10px;
  border-radius:20px;
  font-weight:700;
  font-size:12px;
  box-shadow:0 2px 4px rgba(255, 215, 0, 0.3);
}

.status-dot {
  display:inline-block;
  width:12px;
  height:12px;
  background:#28a745;
  border-radius:50%;
  vertical-align:middle;
  margin-left:8px;
}

button.sync-info-btn {
  background:linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
  box-shadow:0 2px 8px rgba(59, 130, 246, 0.2);
}

button.sync-info-btn:hover {
  background:linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
}

h3 {
  color:#6B4C9A;
  margin-top:0;
}
</style>
</head>

<body>

<!-- 密码登录 -->
<div id="loginPopup" style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; justify-content:center; align-items:center;">
  <div style="background:white; padding:30px; border-radius:10px; text-align:center; min-width:300px; box-shadow:0 10px 40px rgba(0,0,0,0.2);">
    <h2 style="color:#6B4C9A; margin-top:0;">🔐 Access Required</h2>
    <p style="color:#555; margin:10px 0;">Enter password to continue:</p>
    <input id="passwordInput" type="password" placeholder="Enter password" onkeypress="if(event.key==='Enter') verifyPassword()" style="width:100%; padding:12px; font-size:16px; margin:15px 0; box-sizing:border-box; border:2px solid #E5DDF5; border-radius:8px;" autofocus />
    <button onclick="verifyPassword()" style="width:100%; padding:12px; font-size:18px; background:linear-gradient(135deg, #6B4C9A 0%, #7B68BE 100%);">Login</button>
    <p style="color:#999; font-size:12px; margin-top:20px; letter-spacing:0.5px;">
  </div>
</div>

<!-- Header with Logo -->
<header>
  <div class="logo-container">
    <div class="logo-text">🌾</div>
    <div>
      <h1>FreshPro Foodmart</h1>
      <p>ORDER SYSTEM</p>
    </div>
  </div>
</header>

<div class="card">
  <button onclick="syncData()">🔄 Sync Cloud</button>
  <p id="status">Status: Not Synced</p>
</div>

<div class="card">
  <input id="barcode" placeholder="Scan UPC" onkeypress="handleEnter(event)" autofocus />
  <button onclick="startCameraScan()">📷 Scan Barcode by Camera</button>
  <div id="cameraScanPanel" style="display:none; margin-top:12px;">
    <video id="cameraVideo" autoplay playsinline style="width:100%; max-height:320px; background:#000; border-radius:8px; object-fit:cover;"></video>
    <p id="cameraStatus" style="margin:10px 0 0; color:#555; font-size:14px;">Point your camera at a barcode.</p>
    <button onclick="stopCameraScan()" style="margin-top:10px;">Stop Camera</button>
  </div>
</div>

<div class="card">
  <input id="search" placeholder="🔍 Search by Name" onkeypress="handleSearchEnter(event)" />
  <button onclick="searchProducts()">Search</button>
</div>

<div class="card">
  <h3>Items</h3>
  <div id="list"></div>
</div>

<div class="card">
  <button onclick="syncInfo()" class="sync-info-btn">🔖 Mark to supplier</button>
  <button onclick="exportExcel()">📦 Export Excel</button>
</div>

<!-- Mark to Supplier 弹窗 -->
<div id="markSupplierPopup" style="display:none; position:fixed; top:15%; left:5%; width:90%; background:white; padding:20px; border-radius:12px; z-index:999; box-shadow:0 10px 40px rgba(0,0,0,0.15);">
  <h3>Mark To Supplier</h3>
  <input id="markSupplierName" placeholder="Supplier name" style="width:100%; padding:14px; font-size:18px; border:2px solid #E5DDF5; border-radius:8px; box-sizing:border-box; margin-top:14px;" />
  <div style="margin-top:18px; display:flex; gap:10px;">
    <button onclick="saveMarkSupplier()" style="flex:1; width:auto;">Save</button>
    <button onclick="closeSupplierDialog()" style="flex:1; width:auto; background:#ccc; color:#333;">Cancel</button>
  </div>
</div>

<!-- 新产品 -->
<div id="popup" style="display:none; position:fixed; top:10%; left:5%; width:90%; background:white; padding:20px; border-radius:10px; z-index:999;">
<h3>Add Product</h3>
<input id="new_upc" readonly>
<input id="new_name" placeholder="Name">
<input id="new_price" placeholder="Price">
<input id="new_location" placeholder="Location">
<input id="new_supplier" placeholder="Supplier">
<input id="new_cost" placeholder="Cost">
<button onclick="saveNewProduct()">💾 Save</button>
<button onclick="closePopup()">Cancel</button>
</div>

<!-- 编辑 -->
<div id="editPopup" style="display:none; position:fixed; top:10%; left:5%; width:90%; background:white; padding:20px; border-radius:10px; z-index:999;">
<h3>Edit Product</h3>
<input id="edit_upc" readonly>
<input id="edit_name">
<input id="edit_price">
<input id="edit_location">
<input id="edit_supplier">
<input id="edit_cost">
<button onclick="updateProduct()">💾 Save</button>
<button onclick="closeEdit()">Cancel</button>
</div>

<!-- 操作弹窗 -->
<div id="actionPopup" style="display:none; position:fixed; top:15%; left:5%; width:90%; background:white; padding:20px; border-radius:12px; z-index:999;">
<h3>Product Action</h3>
<p id="actionInfo"></p>
<div style="margin-top:8px; display:flex; gap:8px;">
  <input id="action_qty" type="number" min="0" placeholder="Qty" style="flex:1; padding:8px; font-size:16px;" />
  <button onclick="setItemQty()" style="flex:0 0 120px;">Set Qty</button>
</div>
<div style="margin-top:10px; display:flex; gap:8px;">
  <button onclick="removeItem()">❌ Remove</button>
  <button onclick="editItem()">✏️ Edit</button>
  <button onclick="closeAction()">Cancel</button>
</div>
</div>

<!-- 搜索结果 -->
<div id="searchPopup" style="display:none; position:fixed; top:10%; left:5%; width:90%; background:white; padding:20px; border-radius:10px; z-index:999; max-height:70vh; overflow-y:auto;">
<div style="position:sticky; top:0; background:white; z-index:1000; display:flex; justify-content:space-between; align-items:center; gap:10px; margin:-20px -20px 10px -20px; padding:12px 20px; border-bottom:1px solid #eee; border-radius:10px 10px 0 0;">
  <button onclick="addSelectedFromSearch()" style="width:auto; padding:10px 16px; font-size:16px; background:linear-gradient(135deg, #6B4C9A 0%, #7B68BE 100%); color:#fff; border:none; border-radius:8px; cursor:pointer;">ADD</button>
  <div style="display:flex; align-items:center; gap:10px;">
    <button onclick="closeSearch()" style="width:auto; padding:10px 16px; font-size:32px; background:none; border:none; cursor:pointer; color:#999; margin:0; line-height:1;">×</button>
    <h3 style="margin:0;">Search Results</h3>
  </div>
</div>
<div id="searchResults"></div>
<div style="position:sticky; bottom:0; background:white; padding:14px 0 0; display:flex; justify-content:flex-end; gap:10px;">
  <button onclick="closeSearch()" style="flex:1; margin:0; padding:12px 18px;">Close</button>
</div>
</div>

<script>

// 微信 JSSDK 初始化
function initWechatSDK() {
  if (typeof wx === 'undefined') return;
  
  wx.ready(function() {
    console.log('WeChat SDK ready');
  });
  
  wx.error(function(res) {
    console.error('WeChat SDK error:', res);
  });
}

// 页面加载时初始化微信 SDK
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initWechatSDK);
} else {
  initWechatSDK();
}

const API = "https://script.google.com/macros/s/AKfycbw8n_Yd8g0hY5UOQQlFLpuowfc35a0wtLCI1ac9k-46TVDB20iPtR9nXieb9tFQE5QNtQ/exec";

let db = {};
let scanMap = {};
let currentItem = null;
let isAuthenticated = false;
let cameraStream = null;
let cameraScanActive = false;
let cameraFrameId = null;
let barcodeDetector = null;
let selectedSearchUpcs = new Set();
let currentSearchResults = [];
const PASSWORD = "7333";
const statusEl = document.getElementById("status");
const cameraVideo = document.getElementById("cameraVideo");
const cameraStatus = document.getElementById("cameraStatus");
const cameraScanPanel = document.getElementById("cameraScanPanel");

// 密码验证
function verifyPassword(){
  const pwd = document.getElementById("passwordInput").value;
  if(pwd === PASSWORD) {
    isAuthenticated = true;
    document.getElementById("loginPopup").style.display = "none";
    document.getElementById("passwordInput").value = "";
    loadLocalDB();
  } else {
    alert("Incorrect password!");
    document.getElementById("passwordInput").value = "";
  }
}

async function syncCatalogData(){
  try {
    const response = await fetch(API, {
      method: 'GET',
      headers: {
        'Content-Type': 'application/json'
      }
    });
    if(!response.ok) throw new Error("sync failed: " + response.status);

    const data = await response.json();
    db = {};
    data.forEach(row=>{
      db[row[1]] = {
        name: row[0],
        upc: row[1],
        price: row[2],
        location: row[3]||"",
        supplier: row[4]||"",
        cost: row[5]||0
      };
    });

    Object.keys(scanMap).forEach(upc=>{
      if(db[upc]){
        scanMap[upc] = {...db[upc], qty: scanMap[upc].qty};
      }
    });

    localStorage.setItem("productDB", JSON.stringify(db));
    renderList();

    if(document.getElementById("searchPopup").style.display === "block"){
      refreshSearchResults();
    }
  } catch(error) {
    console.error('Sync error:', error);
    throw error;
  }
}

// 同步
function syncData() {
  statusEl.innerText = "Syncing...";
  syncCatalogData()
  .then(()=>{
    statusEl.innerHTML = 'Status: Synced <span class="status-dot"></span>';
  })
  .catch(()=>{
    statusEl.innerText = "Status: Not Synced";
  });
}

function syncInfo(){
  openSupplierDialog();
}

function openSupplierDialog(){
  document.getElementById('markSupplierName').value = '';
  document.getElementById('markSupplierPopup').style.display = 'block';
}

function closeSupplierDialog(){
  document.getElementById('markSupplierPopup').style.display = 'none';
}

function saveMarkSupplier(){
  const supplierName = document.getElementById('markSupplierName').value.trim();
  if(!supplierName){
    alert('Supplier name is empty. No changes were made.');
    closeSupplierDialog();
    return;
  }

  const items = Object.values(scanMap);
  if(items.length === 0){
    alert('No products in the list to mark.');
    closeSupplierDialog();
    return;
  }

  statusEl.innerText = 'Marking products...';
  
  const updateRequests = items.map(p => {
    const data = {
      action: 'update',
      upc: p.upc,
      name: p.name,
      price: p.price,
      location: p.location,
      supplier: supplierName,
      cost: p.cost
    };

    db[p.upc] = {...data};
    scanMap[p.upc] = {...data, qty: p.qty};

    return fetch(API, {
      method: 'POST', 
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    })
      .then(resp => {
        if(!resp.ok) throw new Error('Update failed');
        return resp.text();
      })
      .catch(err => {
        console.error('Update error:', err);
        return null;
      });
  });

  Promise.allSettled(updateRequests).then(() => {
    localStorage.setItem('productDB', JSON.stringify(db));
    renderList();
    closeSupplierDialog();
    statusEl.innerHTML = `Status: Marked ${items.length} products to ${supplierName} <span class="status-dot"></span>`;
  }).catch((err) => {
    console.error('Mark supplier error:', err);
    statusEl.innerText = 'Status: Mark supplier failed. Data saved locally.';
    closeSupplierDialog();
  });
}

function loadLocalDB(){
  const d = localStorage.getItem("productDB");
  if(d){
    db = JSON.parse(d);
    statusEl.innerText = "⚡ Local Mode";
  }
}

function handleEnter(e){
  if(e.key==="Enter") scanProduct();
}

function handleSearchEnter(e){
  if(e.key==="Enter") searchProducts();
}

function stopCameraScan(){
  cameraScanActive = false;
  if(cameraFrameId) {
    cancelAnimationFrame(cameraFrameId);
    cameraFrameId = null;
  }

  if(cameraStream) {
    cameraStream.getTracks().forEach(track => track.stop());
    cameraStream = null;
  }

  if(cameraVideo) {
    cameraVideo.srcObject = null;
  }

  cameraScanPanel.style.display = "none";
  cameraStatus.innerText = "";
}

async function startCameraScan(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    alert("Camera access is not supported on this browser.");
    return;
  }

  if(!window.isSecureContext){
    cameraStatus.innerText = "Camera scan requires HTTPS or localhost. Please open this page via a local server and try again.";
    alert("Camera scan requires HTTPS or localhost. Please open this page through a secure/local server.");
    return;
  }

  if(!("BarcodeDetector" in window)){
    alert("Camera scanning is not supported on this browser. Please use the barcode input or update your browser.");
    return;
  }

  if(!barcodeDetector){
    barcodeDetector = new BarcodeDetector({
      formats: ["ean_13", "ean_8", "upc_a", "upc_e", "code_128", "code_39", "qr_code"]
    });
  }

  try {
    cameraStatus.innerText = "Requesting camera access...";
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" }
      }
    });

    cameraStream = stream;
    cameraVideo.srcObject = stream;
    cameraScanPanel.style.display = "block";
    cameraScanActive = true;
    cameraStatus.innerText = "Point your camera at a barcode.";

    const detectLoop = async () => {
      if(!cameraScanActive) return;

      try {
        const detections = await barcodeDetector.detect(cameraVideo);
        if(detections.length > 0){
          const value = String(detections[0].rawValue || "").trim();
          if(value){
            cameraStatus.innerText = `Detected: ${value}`;
            barcode.value = value;
            stopCameraScan();
            scanProduct();
            return;
          }
        }
      } catch(error) {
        cameraStatus.innerText = "Scanning failed. Please try again.";
      }

      cameraFrameId = requestAnimationFrame(detectLoop);
    };

    cameraFrameId = requestAnimationFrame(detectLoop);
  } catch(error) {
    cameraStatus.innerText = "Camera permission denied or unavailable.";
    alert("Unable to access your camera. Please allow camera access or use the barcode input.");
  }
}

function createSearchLabel(text){
  const label = document.createElement("div");
  label.textContent = text;
  return label;
}

function renderSearchResults(results){
  currentSearchResults = results;
  const searchResults = document.getElementById("searchResults");
  searchResults.innerHTML = "";

  results.forEach(p => {
    const card = document.createElement("div");
    card.className = selectedSearchUpcs.has(p.upc) ? "search-result-card selected" : "search-result-card";

    const toggle = document.createElement("button");
    toggle.type = "button";
    toggle.className = "selection-toggle";
    toggle.innerHTML = selectedSearchUpcs.has(p.upc) ? "●" : "○";
    toggle.onclick = (event) => {
      event.stopPropagation();
      toggleSearchSelection(p.upc);
    };

    const content = document.createElement("div");
    content.className = "product-meta";

    const name = document.createElement("b");
    name.textContent = p.name;

    const upc = createSearchLabel(`UPC: ${p.upc}`);
    const info = createSearchLabel(`Price: $${p.price} | Location: ${p.location}`);
    const supplier = createSearchLabel(`Supplier: ${p.supplier} | Cost: $${p.cost}`);

    content.appendChild(name);
    content.appendChild(upc);
    content.appendChild(info);
    content.appendChild(supplier);

    card.appendChild(toggle);
    card.appendChild(content);
    card.onclick = () => toggleSearchSelection(p.upc);

    searchResults.appendChild(card);
  });
}

function refreshSearchResults(){
  renderSearchResults(currentSearchResults);
}

function toggleSearchSelection(upc){
  if(selectedSearchUpcs.has(upc)){
    selectedSearchUpcs.delete(upc);
  } else {
    selectedSearchUpcs.add(upc);
  }
  refreshSearchResults();
}

// 搜索产品 - 所有关键字都需要完全匹配（忽略大小写和符号）
function searchProducts(){
  const rawKeyword = document.getElementById("search").value.trim();
  if(!rawKeyword) return alert("Please enter product name or UPC");

  selectedSearchUpcs.clear();

  const normalize = text => String(text || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
  const keywords = rawKeyword.toLowerCase().split(/\s+/).filter(Boolean);

  const results = Object.values(db)
    .map(p => {
      const fields = [p.name, p.upc, p.location, p.supplier, p.price, p.cost].join(" ");
      const normalizedFields = normalize(fields);

      const allMatch = keywords.every(term => {
        const normalizedTerm = normalize(term);
        return normalizedFields.includes(normalizedTerm);
      });

      return { ...p, match: allMatch };
    })
    .filter(p => p.match)
    .sort((a, b) => a.name.localeCompare(b.name));

  if(results.length === 0){
    alert("No products found. Make sure all keywords match.");
    return;
  }

  renderSearchResults(results);
  document.getElementById("searchPopup").style.display = "block";
}

function addSelectedFromSearch(){
  if(selectedSearchUpcs.size === 0){
    alert("Please select at least one product.");
    return;
  }

  selectedSearchUpcs.forEach(upc => {
    const p = db[upc];
    if(!p) return;

    if(!scanMap[upc]) scanMap[upc] = {...p, qty:0};
    scanMap[upc].qty++;
  });

  renderList();
  closeSearch();
  document.getElementById("search").value = "";
}

function closeSearch(){
  document.getElementById("searchPopup").style.display = "none";
}

// 扫码
function scanProduct(){
  const code = barcode.value.trim();
  if(!code) return;

  const p = db[code];

  if(!p){
    if(confirm("Not found. Add?")) openPopup(code);
    return;
  }

  if(!scanMap[code]) scanMap[code] = {...p, qty:0};
  scanMap[code].qty++;

  renderList();
  barcode.value="";
}

// 渲染
function renderList(){
  list.innerHTML="";
  Object.values(scanMap).reverse().forEach(p=>{
    const d=document.createElement("div");
    d.className="item";

    d.innerHTML=`
      <div class="item-row">
        <div class="item-content">
          <b>${p.name}</b>
          <div class="item-meta">
            <span>UPC: ${p.upc}</span>
            <span>Price: $${p.price}</span>
            <span>Loc: ${p.location}</span>
            <span>Supplier: ${p.supplier}</span>
            <span>Cost: $${p.cost}</span>
          </div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
          <label style="font-size:17px; color:#555;">Qty</label>
          <input class="qty-input" data-upc="${p.upc}" type="number" min="0" value="${p.qty}" />
        </div>
      </div>
    `;

    const qtyInput = d.querySelector('.qty-input');
    if(qtyInput){
      qtyInput.addEventListener('click', e => e.stopPropagation());
      qtyInput.addEventListener('change', e => {
        e.stopPropagation();
        const value = parseInt(e.target.value || '0', 10);
        if(isNaN(value) || value < 0) return;
        if(value === 0){
          delete scanMap[p.upc];
        } else {
          if(!scanMap[p.upc]) scanMap[p.upc] = {...db[p.upc], qty:0};
          scanMap[p.upc].qty = value;
        }
        renderList();
      });
    }

    d.onclick=()=>showActionPopup(p);
    list.appendChild(d);
  });
}

// Action
function showActionPopup(p){
  currentItem=p;
  actionInfo.innerHTML=`
  <b>${p.name}</b><br>
  ${p.upc}<br>
  $${p.price} | ${p.location}<br>
  ${p.supplier} | $${p.cost}
  `;
  const qtyInput = document.getElementById('action_qty');
  if(qtyInput) qtyInput.value = p.qty || 0;
  actionPopup.style.display="block";
}

function closeAction(){ actionPopup.style.display="none"; }

function removeItem(){
  delete scanMap[currentItem.upc];
  closeAction();
  renderList();
}

function editItem(){
  closeAction();
  openEditPopup(currentItem);
}

function setItemQty(){
  const v = parseInt(document.getElementById('action_qty').value || '0', 10);
  if(isNaN(v) || v < 0) return alert('Enter a valid quantity');
  if(!currentItem) return;
  if(v === 0){
    delete scanMap[currentItem.upc];
  } else {
    if(!scanMap[currentItem.upc]) scanMap[currentItem.upc] = {...db[currentItem.upc], qty:0};
    scanMap[currentItem.upc].qty = v;
  }
  closeAction();
  renderList();
}

// 新产品

function closePopup(){ popup.style.display="none"; }

function saveNewProduct(){
  const data={
    upc:new_upc.value,
    name:new_name.value,
    price:new_price.value,
    location:new_location.value,
    supplier:new_supplier.value,
    cost:new_cost.value
  };

  fetch(API,{
    method:"POST",
    headers: {'Content-Type': 'application/json'},

  })
  .then(()=>{

    localStorage.setItem("productDB",JSON.stringify(db));

// 编辑
function openEditPopup(p){
  editPopup.style.display="block";
  edit_upc.value=p.upc;
  edit_name.value=p.name;
  edit_price.value=p.price;
  edit_location.value=p.location;
  edit_supplier.value=p.supplier;
  edit_cost.value=p.cost;
}

function closeEdit(){ editPopup.style.display="none"; }

function updateProduct(){
  const data={
    action:"update",
    upc:edit_upc.value,
    name:edit_name.value,
    price:edit_price.value,
    location:edit_location.value,
    supplier:edit_supplier.value,
    cost:edit_cost.value
  };

  fetch(API,{
    method:"POST",
    headers: {'Content-Type': 'application/json'},
    body:JSON.stringify(data)
  })
  .then(()=>{
    db[data.upc]=data;
    if(scanMap[data.upc]){
      scanMap[data.upc] = {...data, qty: scanMap[data.upc].qty};
    }
    localStorage.setItem("productDB",JSON.stringify(db));
    closeEdit();
    renderList();
    alert("updates suscessiful, please wait around 1 minute to feitch the cloud");
  })
  .catch(err => {
    console.error('Update product error:', err);
    alert('Failed to sync. Data saved locally.');
    db[data.upc]=data;
    if(scanMap[data.upc]){
      scanMap[data.upc] = {...data, qty: scanMap[data.upc].qty};
    }
    localStorage.setItem("productDB",JSON.stringify(db));
    closeEdit();
    renderList();
  });
}

// Excel
function exportExcel(){
  const items=Object.values(scanMap);
  if(!items.length) return alert("No data");

  const wb=XLSX.utils.book_new();
  const group={};

  items.forEach(p=>{
    if(!group[p.supplier]) group[p.supplier]=[];
    group[p.supplier].push(p);
  });

  Object.keys(group).forEach(s=>{
    const arr=[["UPC","Name","Qty","Cost","Total"]];
    group[s].forEach(p=>{
      arr.push([p.upc,p.name,p.qty,p.cost,p.qty*p.cost]);
    });
    const ws=XLSX.utils.aoa_to_sheet(arr);
    
    const colWidths = [];
    arr[0].forEach((_, colIdx) => {
      let maxLen = arr[0][colIdx].toString().length;
      for(let row = 1; row < arr.length; row++){
        const len = arr[row][colIdx].toString().length;
        if(len > maxLen) maxLen = len;
      }
      colWidths.push({wch: maxLen + 2});
    });
    ws['!cols'] = colWidths;
    
    XLSX.utils.book_append_sheet(wb,ws,s);
  });

  const now = new Date();
  const pad = num => String(num).padStart(2, "0");
  const fileName = `7333 Goreway ${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}/ ${pad(now.getHours())}.xlsx`;
  XLSX.writeFile(wb, fileName);
}
